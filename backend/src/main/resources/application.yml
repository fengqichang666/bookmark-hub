server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/bookmark_hub;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:bookmark-hub-dev-secret-bookmark-hub-dev-secret}
    expiration: ${JWT_EXPIRATION:PT12H}
